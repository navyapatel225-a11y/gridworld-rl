env_id: gridworld-rl
version: "1.0.0"
description: "GridWorld RL environment"

tasks:
  - id: task_easy
    difficulty: easy
    max_steps: 10
    description: "Reach goal efficiently"
    grader:
      type: llm
      prompt_template: |
        Score agent from 0.0 to 1.0 based on reaching goal and efficiency.

  - id: task_medium
    difficulty: medium
    max_steps: 15
    description: "Minimize extra moves"
    grader:
      type: llm
      prompt_template: |
        Score agent based on efficiency and correctness.

  - id: task_hard
    difficulty: hard
    max_steps: 20
    description: "Optimal path required"
    grader:
      type: llm
      prompt_template: |
        Score strictly. Only optimal path gets full marks.
